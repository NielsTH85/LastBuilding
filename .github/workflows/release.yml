name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri release
        run: pnpm --filter planner-web tauri build

      - name: Generate updater manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-updater-manifest.mjs

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            apps/planner-web/src-tauri/target/release/bundle/nsis/*
            apps/planner-web/src-tauri/target/release/bundle/updater/*
            apps/planner-web/src-tauri/target/release/bundle/latest.json
